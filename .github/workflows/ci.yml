name: CI — RiskLab

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Tests del backend ──────────────────────────────────────────────
  test-backend:
    name: Tests Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Ejecutar tests con cobertura
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///:memory:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY || 'ci_dummy_key' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'ci_dummy_key' }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY || 'ci_dummy_key' }}
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Job 2: Build Docker ───────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-backend   # Solo construye si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen backend (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: risklab-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Lint rápido ────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Instalar flake8
        run: pip install flake8

      - name: Ejecutar flake8
        run: |
          flake8 backend/app \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=__pycache__,.venv
