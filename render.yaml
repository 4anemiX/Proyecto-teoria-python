services:
  - type: web
    name: proyecto-teoria-python
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        value: sqlite:///./risklab.db
      - key: GROQ_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        value: demo